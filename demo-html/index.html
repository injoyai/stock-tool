<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例链接导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 1.1rem;
            color: #7f8c8d;
        }

        .action-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .btn-primary {
            background: #3498db;
            color: white;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #2c3e50;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            border-color: #3498db;
            color: #3498db;
            transform: translateY(-2px);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .link-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #e8ecef;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3498db;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .link-card h3 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .link-card p {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .link-card .url {
            color: #3498db;
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #ebf5fb;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.5;
        }

        .link-actions {
            display: flex;
            gap: 10px;
        }

        .link-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-weight: 500;
        }

        .link-btn-open {
            background: #3498db;
            color: white;
        }

        .link-btn-open:hover {
            background: #2980b9;
            transform: scale(1.02);
        }

        .link-btn-copy {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .link-btn-copy:hover {
            background: #bdc3c7;
            transform: scale(1.02);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(44, 62, 80, 0.3);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .action-bar {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 示例链接</h1>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="openAll()">
                <span>🚀</span>
                <span>全部新窗口打开</span>
            </button>
            <button class="btn btn-secondary" onclick="copyAll()">
                <span>📋</span>
                <span>一键复制全部</span>
            </button>
        </div>

        <div class="links-grid" id="linksGrid">
            <!-- 示例链接卡片 -->
            <div class="link-card">
                <h3>示例: 集合竞价</h3>
                <div class="url">https://pan.baidu.com/s/1YIkpCAVtWhxXSNGDCbbNag?pwd=5XH6</div>
                <div class="link-actions">
                    <button class="link-btn link-btn-open" onclick="openLink('https://pan.baidu.com/s/1YIkpCAVtWhxXSNGDCbbNag?pwd=5XH6')">
                        <span>🔗</span>
                        <span>打开</span>
                    </button>
                    <button class="link-btn link-btn-copy" onclick="copyLink('https://pan.baidu.com/s/1YIkpCAVtWhxXSNGDCbbNag?pwd=5XH6')">
                        <span>📋</span>
                        <span>复制</span>
                    </button>
                </div>
            </div>

            <div class="link-card">
                <h3>示例链接 2</h3>
                <p>这是另一个示例链接的描述</p>
                <div class="url">https://example.com/demo2</div>
                <div class="link-actions">
                    <button class="link-btn link-btn-open" onclick="openLink('https://example.com/demo2')">
                        <span>🔗</span>
                        <span>打开</span>
                    </button>
                    <button class="link-btn link-btn-copy" onclick="copyLink('https://example.com/demo2')">
                        <span>📋</span>
                        <span>复制</span>
                    </button>
                </div>
            </div>

            <div class="link-card">
                <h3>示例链接 3</h3>
                <p>更多示例链接请继续添加</p>
                <div class="url">https://example.com/demo3</div>
                <div class="link-actions">
                    <button class="link-btn link-btn-open" onclick="openLink('https://example.com/demo3')">
                        <span>🔗</span>
                        <span>打开</span>
                    </button>
                    <button class="link-btn link-btn-copy" onclick="copyLink('https://example.com/demo3')">
                        <span>📋</span>
                        <span>复制</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 获取所有链接
        function getAllLinks() {
            return Array.from(document.querySelectorAll('.link-card .url'))
                .map(el => el.textContent.trim());
        }

        // 打开单个链接
        function openLink(url) {
            window.open(url, '_blank');
        }

        // 复制单个链接
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('✅ 链接已复制！');
            }).catch(() => {
                showToast('❌ 复制失败，请手动复制');
            });
        }

        // 打开所有链接
        function openAll() {
            const links = getAllLinks();
            links.forEach((url, index) => {
                setTimeout(() => {
                    window.open(url, '_blank');
                }, index * 200);
            });
            showToast(`🚀 正在打开 ${links.length} 个链接...`);
        }

        // 复制所有链接
        function copyAll() {
            const links = getAllLinks();
            const allLinks = links.join('\n');
            navigator.clipboard.writeText(allLinks).then(() => {
                showToast(`✅ 已复制 ${links.length} 个链接！`);
            }).catch(() => {
                showToast('❌ 复制失败，请手动复制');
            });
        }

        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
